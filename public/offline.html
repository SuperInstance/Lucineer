<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lucineer — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; }
    h1 { font-size: 1.5rem; color: #22c55e; font-weight: 700; }
    p { color: #9ca3af; max-width: 300px; line-height: 1.6; }
    .sub { margin-top: 0.5rem; color: #6b7280; font-size: 0.85rem; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover { background: #15803d; }
    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #22c55e, #059669);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="logo">🔲</div>
  <div class="icon">🔌</div>
  <h1>You're Offline</h1>
  <p>Your internet connection is unavailable. Lucineer needs a connection to load new content.</p>
  <p class="sub">Previously visited pages may still be available — check your browser's back button.</p>
  <button onclick="window.location.reload()">Try Again</button>
  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
