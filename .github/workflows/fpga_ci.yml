# MLS FPGA CI — Nightly builds, compliance testing, weekly benchmarks
#
# Pipeline:
#   1. Lint all RTL (Verilator --lint-only)
#   2. Run testbenches (PE, chip integration, compliance)
#   3. Build reference designs (synthesis check)
#   4. Run performance benchmark (simulated)
#   5. Post results as artifact
#
# Weekly (Saturday): Program real KV260 via self-hosted runner

name: FPGA CI

on:
  # Nightly at 2:00 AM UTC
  schedule:
    - cron: '0 2 * * *'

  # On push to hardware-related paths
  push:
    paths:
      - 'reference/**'
      - 'fpga_lab/**'
      - 'compiler/clawc/backend/**'
      - 'standards/**'
      - 'download/ternaryair/hardware/**'

  # Manual trigger
  workflow_dispatch:
    inputs:
      run_benchmark:
        description: 'Run full benchmark suite'
        type: boolean
        default: false
      program_fpga:
        description: 'Program real KV260 hardware'
        type: boolean
        default: false

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: RTL Lint
  # ─────────────────────────────────────────────────────────
  lint:
    name: RTL Lint (Verilator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Verilator version
        run: verilator --version

      - name: Lint common RTL
        run: |
          verilator --lint-only -Wall \
            reference/common/mls_common.sv \
            reference/common/a2a_register_file.sv

      - name: Lint USB-C dongle
        run: |
          verilator --lint-only -Wall -DSIMULATION \
            --top-module usb_dongle_top \
            reference/common/mls_common.sv \
            reference/common/a2a_register_file.sv \
            download/ternaryair/hardware/rtl/rau.sv \
            download/ternaryair/hardware/rtl/synaptic_array.sv \
            download/ternaryair/hardware/rtl/weight_rom.sv \
            download/ternaryair/hardware/rtl/kv_cache.sv \
            reference/form_factors/usb_c_dongle/rtl/usb_dongle_top.sv
        continue-on-error: true

      - name: Lint M.2 card
        run: |
          verilator --lint-only -Wall -DSIMULATION \
            --top-module m2_card_top \
            reference/common/mls_common.sv \
            reference/common/a2a_register_file.sv \
            download/ternaryair/hardware/rtl/rau.sv \
            download/ternaryair/hardware/rtl/synaptic_array.sv \
            download/ternaryair/hardware/rtl/weight_rom.sv \
            download/ternaryair/hardware/rtl/kv_cache.sv \
            reference/form_factors/m2_card/rtl/m2_card_top.sv
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # Job 2: Testbenches (Verilator simulation)
  # ─────────────────────────────────────────────────────────
  testbenches:
    name: Testbenches
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Run PE testbench
        working-directory: fpga_lab/testbenches
        run: make pe SIM=verilator

      - name: Run chip integration testbench
        working-directory: fpga_lab/testbenches
        run: make chip SIM=verilator

      - name: Run MLS-1.0 compliance testbench
        working-directory: fpga_lab/testbenches
        run: make compliance SIM=verilator

      - name: Upload waveforms
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: waveforms
          path: fpga_lab/testbenches/*.vcd

  # ─────────────────────────────────────────────────────────
  # Job 3: Python compliance suite
  # ─────────────────────────────────────────────────────────
  compliance:
    name: MLS Compliance Suite (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run compliance tests
        working-directory: standards/reference/compliance_tests
        run: python test_suite.py

      - name: Save compliance certificate
        working-directory: standards/reference/compliance_tests
        run: |
          python -c "
          from test_suite import run_compliance_suite
          import json
          cert = run_compliance_suite()
          with open('certificate.json', 'w') as f:
              json.dump(cert, f, indent=2)
          print('Certificate saved')
          "

      - name: Upload certificate
        uses: actions/upload-artifact@v4
        with:
          name: mls-compliance-certificate
          path: standards/reference/compliance_tests/certificate.json

  # ─────────────────────────────────────────────────────────
  # Job 4: Performance benchmark (simulated)
  # ─────────────────────────────────────────────────────────
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    needs: [testbenches, compliance]
    if: github.event_name == 'schedule' || github.event.inputs.run_benchmark == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run KV260 benchmark (simulated)
        run: |
          python fpga_lab/measurements/performance/benchmark.py \
            --platform kv260 --model bitnet-2b --tokens 100 \
            --output-dir results/

      - name: Run power measurement (simulated)
        run: |
          python fpga_lab/measurements/power/measure.py \
            --platform kv260 --source simulation --duration 5 \
            --output-dir results/

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/

  # ─────────────────────────────────────────────────────────
  # Job 5: Weekly real hardware test (self-hosted runner)
  # ─────────────────────────────────────────────────────────
  hardware_test:
    name: KV260 Hardware Test
    runs-on: self-hosted
    needs: testbenches
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 6') ||
      github.event.inputs.program_fpga == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Check KV260 connection
        run: |
          echo "Checking KV260 connection..."
          # xsdb -eval 'connect; targets' || echo "KV260 not connected"

      - name: Program bitstream
        run: |
          echo "Programming KV260 with latest bitstream..."
          # xsdb -eval 'connect; targets -set -filter {name =~ "*A53*#0"}; \
          #   fpga fpga_lab/bitstreams/kv260_bitnet2b.bit'

      - name: Run hardware benchmark
        run: |
          echo "Running benchmark on real hardware..."
          python3 fpga_lab/measurements/performance/benchmark.py \
            --platform kv260 --model bitnet-2b --tokens 100 \
            --output-dir results/hardware/

      - name: Run power measurement
        run: |
          echo "Measuring power on real hardware..."
          python3 fpga_lab/measurements/power/measure.py \
            --platform kv260 --source ina226 --duration 30 \
            --output-dir results/hardware/

      - name: Run thermal logging
        run: |
          python3 fpga_lab/measurements/thermal/thermal_logger.py \
            --duration 30 --output-dir results/hardware/

      - name: Upload hardware results
        uses: actions/upload-artifact@v4
        with:
          name: hardware-results
          path: results/hardware/
