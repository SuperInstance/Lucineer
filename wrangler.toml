# ─────────────────────────────────────────────────────────────────
# Lucineer — Cloudflare Pages Deployment
# Uses @opennextjs/cloudflare to run Next.js on the edge
# ─────────────────────────────────────────────────────────────────

name = "lucineer"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Pages build output (generated by opennextjs-cloudflare)
pages_build_output_dir = ".open-next/assets"

# ── D1 Database ───────────────────────────────────────────────────
# Provision with: wrangler d1 create lucineer
# Then fill in database_id below
[[d1_databases]]
binding = "DB"
database_name = "lucineer"
database_id = "REPLACE_AFTER_wrangler_d1_create"

# ── R2 Storage ────────────────────────────────────────────────────
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "lucineer-assets"

# ── KV Cache ──────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "REPLACE_AFTER_wrangler_kv_create"

# ── Public Environment Variables ─────────────────────────────────
[vars]
NODE_ENV = "production"
NEXT_PUBLIC_APP_URL = "https://lucineer.com"

# ── Secrets (set via CLI) ─────────────────────────────────────────
# wrangler secret put ZAI_API_KEY
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put NEXTAUTH_SECRET

# ── Preview Environment ───────────────────────────────────────────
[env.preview]
name = "lucineer-preview"
vars = { NODE_ENV = "preview", NEXT_PUBLIC_APP_URL = "https://lucineer-preview.pages.dev" }

[[env.preview.d1_databases]]
binding = "DB"
database_name = "lucineer"
database_id = "REPLACE_AFTER_wrangler_d1_create"

[[env.preview.r2_buckets]]
binding = "STORAGE"
bucket_name = "lucineer-assets"

[[env.preview.kv_namespaces]]
binding = "CACHE"
id = "REPLACE_AFTER_wrangler_kv_create"
